apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubehealer.web.fullname" . }}
  labels:
    {{- include "kubehealer.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubehealer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "kubehealer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubehealer.fullname" . }}-secrets
                  key: JWT_SECRET
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubehealer.fullname" . }}-secrets
                  key: NEXTAUTH_SECRET
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.web.env.nextPublicApiUrl | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.web.env.nextAuthUrl | quote }}
            - name: NEXT_PUBLIC_AUTH_DISABLED
              value: {{ .Values.web.env.authDisabled | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "cognix.agent.fullname" . }}
  labels:
    {{- include "cognix.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  type: {{ .Values.agent.service.type }}
  ports:
    - port: {{ .Values.agent.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cognix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent

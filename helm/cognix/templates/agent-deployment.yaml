apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cognix.agent.fullname" . }}
  labels:
    {{- include "cognix.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicaCount }}
  selector:
    matchLabels:
      {{- include "cognix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "cognix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: {{ include "cognix.serviceAccountName" . }}
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cognix.fullname" . }}-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cognix.fullname" . }}-secrets
                  key: DATABASE_URL
            - name: OLLAMA_URL
              value: {{ .Values.agent.env.ollamaUrl | quote }}
            - name: MAX_MEMORY_LIMIT
              value: {{ .Values.agent.env.maxMemoryLimit | quote }}
            - name: ALLOW_LOCAL_KUBECONFIG
              value: {{ .Values.agent.env.allowLocalKubeconfig | quote }}
          volumeMounts:
            - name: data
              mountPath: /app/.kubehealer
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.agent.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cognix.agent.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}

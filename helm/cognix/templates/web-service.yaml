apiVersion: v1
kind: Service
metadata:
  name: {{ include "cognix.web.fullname" . }}
  labels:
    {{- include "cognix.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cognix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
